services:
  migration:
    container_name: budgetcontrol-migrations
    image: budgetcontrol/php-8.3-apache:v1
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: on-failure
    volumes:
      - .:/var/www/workdir
    networks:
      - default

networks:
  default:
    external:
      true
    name: budgetcontrol_network