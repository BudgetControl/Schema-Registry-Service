name: Deploy Wallet application

on:
  workflow_dispatch:
  push:
    branches: [ "develop" ]

permissions:
  contents: read

jobs:
  deploy_job:
    runs-on: ubuntu-latest
    environment: dev
    name: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Aggiornato alla v4

      - name: deploy file
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USER }} 
          server: ${{ secrets.SFTP_HOST }} 
          password: ${{ secrets.SFTP_PASSWORD }} 
          port: ${{ secrets.SFTP_PORT }}
          local_path: '.'
          remote_path: '/var/www/BudgetControl/microservices/SchemaRegistryService'
          sftpArgs: '-o ConnectTimeout=5'

      - name: Running migrations
        # Rimosso il 'needs' che causava l'errore
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          script: |
            docker exec budgetcontrol-migrations bash -c "composer install && vendor/bin/phinx migrate"